steps:
  # Build image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/backend:$SHORT_SHA', '.']

  # Push ke registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/backend:$SHORT_SHA']

  # Deploy ke Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
    - 'run'
    - 'deploy'
    - 'acaris-service'
    - '--image'
    - 'gcr.io/$PROJECT_ID/backend:$SHORT_SHA'
    - '--region'
    - 'asia-southeast2'
    - '--platform'
    - 'managed'
    - '--allow-unauthenticated'

    # ✅ ENV non-sensitif (aman di sini)
    - '--set-env-vars=NODE_ENV=production'
    - '--set-env-vars=DB_HOST=/cloudsql/acaris-app:asia-southeast2:acaris-db'
    - '--set-env-vars=DB_USER=acaris_user'
    - '--set-env-vars=DB_NAME=acaris_db'
    - '--set-env-vars=EMAIL_USER=marsneedduitbanget@gmail.com'
    - '--set-env-vars=GCS_BUCKET=acaris-storage'

    # ✅ SECRETS — diambil dari Google Secret Manager (bukan plaintext)
    # Pastikan secret sudah dibuat dulu:
    #   gcloud secrets create JWT_SECRET --data-file=-   (lalu paste nilainya)
    #   gcloud secrets create DB_PASSWORD --data-file=-
    #   gcloud secrets create EMAIL_PASS --data-file=-
    #   gcloud secrets create REDIS_URL --data-file=-
    - '--set-secrets=JWT_SECRET=JWT_SECRET:latest'
    - '--set-secrets=DB_PASSWORD=DB_PASSWORD:latest'
    - '--set-secrets=EMAIL_PASS=EMAIL_PASS:latest'
    - '--set-secrets=REDIS_URL=REDIS_URL:latest'

    # ✅ Cloud SQL
    - '--add-cloudsql-instances=acaris-app:asia-southeast2:acaris-db'

    # ✅ DIHAPUS: PORT — Cloud Run inject otomatis, jangan di-set manual
    # ✅ DIHAPUS: DB_PASSWORD, EMAIL_PASS, REDIS_URL plaintext dari sini

images:
  - 'gcr.io/$PROJECT_ID/backend:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
